name: Deploy ReDice to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Prepare Pages artifact
        run: |
          mkdir -p public

          cp -r publish/wwwroot/* public/

          if [ -d "wwwroot/icons" ]; then
            mkdir -p public/icons
            cp -r wwwroot/icons/* public/icons/
          fi

          if [ -d "wwwroot/Scripts" ]; then
            mkdir -p public/Scripts
            cp -r wwwroot/Scripts/* public/Scripts/
          fi

          if [ -d "Scripts" ]; then
            mkdir -p public/Scripts
            cp -r Scripts/* public/Scripts/
          fi

          echo "=== PUBLIC FILES ==="
          find public -maxdepth 3 -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4